<!DOCTYPE html>
<html lang="es-MX" xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <title>Sistema de Inventario - Mermas y Devoluciones</title>
    <link rel="icon" type="image/x-icon" href="#{request.contextPath}/favicon.ico" />
    <h:outputStylesheet library="primefaces" name="primeicons/primeicons.css" />
    <link rel="stylesheet" href="#{request.contextPath}/css/form.css" />
    <style>
        .ui-panelgrid .ui-grid-responsive .ui-grid-row {
            border: none !important;
        }

        .label {
            font-weight: bold;
            width: 150px;
        }

        .value {
            width: 300px;
        }

        .flex-container {
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            gap: 20px;
            padding: 20px;
        }

        /* Estilo extra para asegurar que el botón resalte */
        .btn-excel {
            background-color: #217346 !important;
            /* Verde Excel */
            border-color: #217346 !important;
            color: white !important;
        }

        .btn-pdf {
            background-color: #D32F2F !important;
            /* Rojo PDF */
            border-color: #D32F2F !important;
            color: white !important;
        }
    </style>
</h:head>
<h:body>
    <h:form id="formReporte">
        <ui:include src="/pages/almacen/menu.xhtml" />

        <p:separator />
        <p:toolbar style="margin-bottom: 20px; border: none; background: transparent;">
            <f:facet name="left">
                <p:commandButton value="Regresar" icon="pi pi-chevron-left"
                    action="#{inventarioReporteBean.irAReportePrincipal}" immediate="true" style="margin-left:10px;" />
            </f:facet>
        </p:toolbar>
        <p:separator />
        <p:panel header="Reporte de Mermas y Devoluciones">
            <p:dataTable id="tblMovimientos" value="#{inventarioReporteBean.mermasDevolucions}" var="mov"
                paginator="true" rows="20" emptyMessage="No se encontraron movimientos">
                <f:facet name="header">
                    <div style="display: flex; justify-content: center; align-items: center; gap: 15px;">
                        <span style="font-weight: bold;"></span>

                        <p:commandButton value="Exportar Excel" icon="pi pi-file-excel" ajax="false"
                            styleClass="btn-excel">
                            <p:dataExporter type="xls" target="tblMovimientos"
                                preProcessor="#{inventarioReporteBean.exportarMermasDevolucionesExcel}"
                                fileName="#{inventarioReporteBean.reporteMermasDevoluciones}" pageOnly="false" />
                        </p:commandButton>

                        <p:commandButton value="Exportar Pdf" icon="pi pi-file-pdf" ajax="false" styleClass="btn-pdf">
                            <p:dataExporter type="pdf" target="tblMovimientos"
                                preProcessor="#{inventarioReporteBean.exportarMermasDevolucionesPdf}"
                                fileName="#{inventarioReporteBean.reporteMermasDevoluciones}" />
                        </p:commandButton>
                    </div>
                </f:facet>

                <p:column headerText="Fecha" width="60">
                    <h:outputText value="#{mov.fecha}" />
                </p:column>
                <p:column headerText="Nombre Producto">
                    <h:outputText value="#{mov.nombreProducto}" />
                </p:column>
                <p:column headerText="Tipo" width="70">
                    <h:outputText value="#{mov.tipo}" />
                </p:column>

                <p:column headerText="Responsable" width="70">
                    <h:outputText value="#{mov.responsable}" />
                </p:column>

                <p:column headerText="Rol" width="70">
                    <h:outputText value="#{mov.rol}" />
                </p:column>

                <p:column headerText="Cantidad" width="70">
                    <h:outputText value="#{mov.cantidad}" />
                </p:column>

                  <p:column headerText="Total Perdido" width="70">
                    <h:outputText value="#{mov.totalPerdido}" />
                </p:column>
            </p:dataTable>
        </p:panel>
    </h:form>
    <ui:include src="/pages/almacen/footer.xhtml" />
</h:body>
</html>
