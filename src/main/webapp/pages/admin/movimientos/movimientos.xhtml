<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html lang="es-MX" xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<h:head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <link rel="icon" type="image/x-icon" href="#{request.contextPath}/favicon.ico" />
    <link rel="stylesheet" href="https://unpkg.com/primeicons@2.0.0/primeicons.css" />
    <link rel="stylesheet" href="#{request.contextPath}/css/form.css" />

    <style type="text/css">
        .ui-panelgrid .ui-grid-responsive .ui-grid-row {
            border: none !important;
        }

        .main-container {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            padding: 20px;
        }

        .form-side {
            flex: 0 0 600px;
        }

        .table-side {
            flex: 1;
        }

        .label {
            width: 160px;
            text-align: right;
            font-weight: bold;
            padding-right: 15px;
            vertical-align: middle;
        }

        .value {
            text-align: left;
            vertical-align: middle;
        }

        /* Estilo para asegurar que todos los campos midan lo mismo */
        .ancho-fijo {
            width: 250px !important;
        }
    </style>

    <script type="text/javascript">
        //<![CDATA[

        function forceFocus() {
            var inputScanner = document.getElementById('formMovimiento:scannerInput');
            var activeEl = document.activeElement.tagName.toLowerCase();
            if (inputScanner && activeEl !== 'input' && activeEl !== 'textarea' && activeEl !== 'select') {
                inputScanner.focus();
            }
        }

        function manejarEntradaApp(event) {
            if (event.key === "Enter") {
                event.preventDefault();
                var input = document.getElementById("formMovimiento:scannerInput");
                if (input && input.value.trim() !== "") {
                    input.dispatchEvent(new Event('change'));
                }
                return false;
            }
            return true;
        }

        function limpiarScanner() {
            var input = document.getElementById("formMovimiento:scannerInput");
            if (input) {
                input.value = "";
                input.focus();
            }
        }

        $(document).ready(function () {
            forceFocus();
        });

        //]]>
    </script>

    <title>Registrar Movimiento</title>

</h:head>

<h:body>

    <h:form id="formMovimiento" enctype="multipart/form-data">

        <ui:include src="/pages/admin/menu.xhtml" />

        <p:growl id="messages" showDetail="true" />

        <div class="main-container">

            <div class="form-side">

                <p:panel header="Registro de Movimientos" style="width: 600px; margin: 0 auto;">

                    <h:panelGrid columns="2" cellpadding="5" columnClasses="label,value" style="width: 100%;">

                        <h:outputLabel id="lblProducto" value="Scanner (Código): *" />
                        <h:panelGroup id="grupoProducto">
                            <div style="display: flex; gap: 5px; align-items: center;">
                                <p:inputText id="scannerInput" value="#{movimientosBean.movimientos.codigoBarras}"
                                    placeholder="Escanee con la App..." styleClass="ancho-fijo" autocomplete="off"
                                    onkeydown="return manejarEntradaApp(event);">
                                    <p:ajax event="change" listener="#{movimientosBean.cargarInfoScanner()}"
                                        process="@this" update="messages panelInfoExtra txtIdProducto txtNombreProducto"
                                        oncomplete="limpiarScanner()" />
                                </p:inputText>
                                <p:commandButton icon="pi pi-barcode"
                                    actionListener="#{movimientosBean.toggleScanner()}"
                                    update="lblProducto grupoProducto panelInfoExtra" process="@this"
                                    immediate="true" />
                            </div>
                        </h:panelGroup>

                        <p:outputLabel value="Información:" />
                        <h:panelGroup id="panelInfoExtra">
                            <p:inputText value="#{movimientosBean.infoProductoExtra}" readonly="true"
                                styleClass="ancho-fijo" style="background:#f0f4f7; font-weight:bold; color:#0a58ca;"
                                placeholder="Esperando lectura..." />
                        </h:panelGroup>

                        <p:outputLabel for="movimiento" value="Tipo de Movimiento: *" />
                        <p:selectOneMenu id="movimiento" value="#{movimientosBean.movimientos.tipoMovimiento}"
                            filter="true" filterMatchMode="contains" styleClass="ancho-fijo">
                            <f:selectItem itemLabel="Seleccione una opción" itemValue="" noSelectionOption="true" />
                            <f:selectItem itemLabel="Entrada" itemValue="Entrada" />
                            <f:selectItem itemLabel="Salida" itemValue="Salida" />
                            <f:selectItem itemLabel="Ajuste" itemValue="Ajuste" />
                        </p:selectOneMenu>

                        <h:outputLabel value="Id Producto:" />
                        <p:inputText id="txtIdProducto" value="#{movimientosBean.movimientos.idProducto}"
                            styleClass="ancho-fijo" />

                        <h:outputLabel value="Nombre Producto:" />
                        <p:inputText id="txtNombreProducto" value="#{movimientosBean.movimientos.nombreProducto}"
                            styleClass="ancho-fijo" />

                        <h:outputLabel value="Cantidad:" />
                        <p:inputText value="#{movimientosBean.movimientos.cantidad}" styleClass="ancho-fijo" />

                        <h:outputLabel value="Fecha:" />
                        <p:calendar value="#{movimientosBean.movimientos.fechaHora}" pattern="dd/MM/yyyy HH:mm:ss"
                            timeZone="America/Mexico_City" showButtonPanel="true" styleClass="ancho-fijo" />

                        <h:outputLabel value="Origen Destino:" />
                        <p:inputText value="#{movimientosBean.movimientos.origenDestino}" styleClass="ancho-fijo" />

                        <h:outputLabel value="Usuario logueado:" />
                        <p:inputText value="#{loginBean.usuario.nombre}" readonly="true"
                            styleClass="readonly ancho-fijo" />

                        <h:outputLabel value="Observaciones:" />
                        <p:inputTextarea rows="3" value="#{movimientosBean.movimientos.observaciones}"
                            styleClass="ancho-fijo" />

                    </h:panelGrid>

                    <h:inputHidden value="#{movimientosBean.movimientos.idUsuario}" />

                    <p:separator />

                    <p:commandButton value="Guardar" icon="pi pi-save" action="#{movimientosBean.save}" process="@form"
                        update="formMovimiento"
                        oncomplete="if (!args.validationFailed) PF('dlgConfirmacion').show();" />

                    <p:commandButton value="Regresar" icon="pi pi-chevron-left"
                        action="#{movimientosBean.irATablaMovimientos}" immediate="true" style="margin-left: 10px;" />

                    <div class="upload-section" style="margin-top: 20px;">
                        <h:outputLabel value="Cargar desde archivo (CSV, Excel):"
                            style="display:block; margin-bottom:5px; font-weight:bold;" />
                        <p:fileUpload value="#{movimientosBean.uploadedFile}" mode="simple" skinSimple="true"
                            label="Seleccionar Archivo" chooseIcon="pi pi-upload" />
                        <p:commandButton value="Procesar Archivo" action="#{movimientosBean.cargarArchivo}" ajax="false"
                            styleClass="ui-button-help" style="margin-top: 5px;" icon="pi pi-file-import" />
                    </div>

                </p:panel>

            </div>

            <div class="table-side">
                <p:dataTable id="tablaRegistros" value="#{movimientosBean.listaMovimientosGuardar}" var="mov" rows="10"
                    paginator="true" paginatorPosition="bottom" emptyMessage="No hay movimientos registrados">
                    <p:column headerText="Id Producto">
                        <h:outputText value="#{mov.idProducto}" />
                    </p:column>
                    <p:column headerText="Tipo">
                        <h:outputText value="#{mov.tipoMovimiento}" />
                    </p:column>
                    <p:column headerText="Cant.">
                        <h:outputText value="#{mov.cantidad}" />
                    </p:column>
                    <p:column headerText="Fecha">
                        <h:outputText value="#{mov.fechaHora}">
                            <f:convertDateTime pattern="dd/MM/yyyy HH:mm" />
                        </h:outputText>
                    </p:column>
                    <p:column headerText="Origen">
                        <h:outputText value="#{mov.origenDestino}" />
                    </p:column>
                    <p:column headerText="Responsable">
                        <h:outputText value="#{loginBean.usuario.nombre}" />
                    </p:column>
                </p:dataTable>

                <p:separator />

                <p:commandButton value="Guardar Tabla" icon="pi pi-save" action="#{movimientosBean.saveTable}"
                    process="@form" update="tablaRegistros"
                    oncomplete="if (!args.validationFailed) PF('dlgConfirmacionGuardar').show();" />
            </div>

        </div>

        <p:dialog header="Mensaje" widgetVar="dlgConfirmacion" modal="true" closable="false">
            <h:outputText value="Datos guardados correctamente." />
            <br /><br />
            <p:commandButton value="Aceptar" type="button" onclick="PF('dlgConfirmacion').hide();" />
        </p:dialog>

        <p:dialog header="Mensaje" widgetVar="dlgConfirmacionGuardar" modal="true" closable="false">
            <h:outputText value="Datos guardados correctamente." />
            <br /><br />
            <p:commandButton value="Aceptar" type="button" onclick="PF('dlgConfirmacionGuardar').hide();" />
        </p:dialog>

    </h:form>

    <ui:include src="/pages/admin/footer.xhtml" />

</h:body>

</html>
