<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html lang="es-MX" xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <link rel="icon" type="image/x-icon" href="#{request.contextPath}/favicon.ico" />
    <link rel="stylesheet" href="https://unpkg.com/primeicons/primeicons.css" />
    <link rel="stylesheet" href="#{request.contextPath}/css/form.css" />
        <link rel="stylesheet" href="#{request.contextPath}/css/dark-mode.css" />


    <title>Gestión de Movimientos</title>
    <style type="text/css">
        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f9;
            margin: 20px;
        }

        /* Quitar degradados de la cabecera de la tabla */
        .ui-datatable .ui-datatable-header,
        .ui-datatable .ui-column-header {
            background: #ffffff !important;
            border-bottom: 2px solid #ebedef !important;
            text-transform: uppercase;
            font-size: 12px;
            letter-spacing: 0.5px;
        }

        /* Estilo de los Badges */
        .badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }
    </style>
</h:head>
<h:body>

    <h:form id="form">
        <ui:include src="/pages/admin/menu.xhtml" />

        <p:growl id="msgs" showDetail="true" />
        <p:separator />

        <p:toolbar style="margin-bottom: 20px; border: none; background: transparent;">
            <f:facet name="left">
                <p:commandButton value="Nuevo Movimiento" icon="pi pi-plus" type="button"
                    onclick="PF('dlgEscaneo').show();"
                    oncomplete="setTimeout(function(){ document.getElementById('formEscaneo:codigoEscaneado').focus(); }, 250);"
                    styleClass="ui-button-info" />
            </f:facet>
            <f:facet name="right">
                <p:commandButton value="Regresar" icon="pi pi-chevron-left" action="#{movimientosBean.irADashboard}"
                    immediate="true" style="margin-left:10px;" />
            </f:facet>
        </p:toolbar>
        <p:separator />

        <p:dataTable id="tablaMovimientos" var="prod" value="#{movimientosBean.list}" rows="10" paginator="true"
            filteredValue="#{movimientosBean.filteredList}" emptyMessage="No se encontraron Movimientos"
            style="margin-top:20px;">

            <p:column headerText="ID">
                <h:outputText value="#{prod.idMovimiento}" />
            </p:column>

            <p:column headerText="Producto">
                <h:outputText value="#{prod.productos.nombre}" />
            </p:column>

            <p:column headerText="Tipo Movimiento">
                <h:outputText value="#{prod.tipoMovimiento}" />
            </p:column>

            <p:column headerText="Cantidad">
                <h:outputText value="#{prod.cantidad}" />
            </p:column>

            <p:column headerText="Fecha de Movimiento" filterBy="#{prod.fechaHora}" filterMatchMode="contains">
                <h:outputText value="#{prod.fechaHora}" />
            </p:column>

            <p:column headerText="Origen Destino">
                <h:outputText value="#{prod.origenDestino}" />
            </p:column>

            <p:column headerText="Stock Previo">
                <h:outputText value="#{prod.stockPrevio}" />
            </p:column>

            <p:column headerText="Stock Posterior">
                <h:outputText value="#{prod.stockPosterior}" />
            </p:column>

            <p:column headerText="Usuario Responsable" filterBy="#{prod.idUsuario}" filterMatchMode="contains">
                <h:outputText value="#{prod.usuario.nombre}" />
            </p:column>

            <p:column headerText="Observaciones">
                <h:outputText value="#{prod.observaciones}" />
            </p:column>
        </p:dataTable>
    </h:form>
    <ui:include src="/pages/admin/footer.xhtml" />

       <p:dialog header="Escanear Producto para Movimiento" widgetVar="dlgEscaneo" modal="true" resizable="false"
        width="400" showEffect="fade">
        <h:form id="formEscaneo">
            <div class="p-grid p-dir-col">
                <p:outputLabel for="codigoEscaneado" value="Pase el escáner por el código de barras:" />
                <p:inputText id="codigoEscaneado" value="#{movimientosBean.codigoFiltro}"
                    style="width:100%; font-size: 1.5rem; text-align: center;" placeholder="Esperando lectura..."
                    autocomplete="off">
                    <p:ajax event="keyup" listener="#{movimientosBean.procesarEscaneoMovimientos}" delay="100" />
                </p:inputText>
                <p:message for="codigoEscaneado" />
                <p:staticMessage severity="info" summary="INFO"
                    detail="La pistola enviará el código automáticamente al terminar."
                    style="width: 100%; margin-top: 10px;" />
            </div>
        </h:form>
    </p:dialog>
</h:body>
</html>
