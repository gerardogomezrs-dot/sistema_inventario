<!DOCTYPE html>
<html lang="es-MX" xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <title>Sistema de Inventario - Mermas y Devoluciones</title>
    <link rel="icon" type="image/x-icon" href="#{request.contextPath}/favicon.ico" />
    <link rel="stylesheet" href="https://unpkg.com/primeicons/primeicons.css" />
        <link rel="stylesheet" href="#{request.contextPath}/css/dark-mode.css" />

    <style>
        /* Estilo para simular el p:tag en PrimeFaces 7 */
        .badge-info {
            background-color: #e3f2fd;
            color: #1565c0;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid #2196f3;
            display: inline-block;
        }

        .ui-panel {
            margin-top: 10px;
        }

        /* ===== ESTILOS PARA LA TABLA DE MERMAS Y DEVOLUCIONES ===== */
        .mermas-table {
            width: 100%;
            border-collapse: collapse;
        }

        .mermas-table th,
        .mermas-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }

        .mermas-table th {
            background-color: #f2f2f2;
            font-weight: bold;
        }

        .mermas-table tr:hover {
            background-color: #f9f9f9;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }

        .status-approved {
            background-color: #4caf50;
        }

        .status-pending {
            background-color: #ff9800;
        }

        .status-rejected {
            background-color: #f44336;
        }
    </style>
</h:head>
<h:body>
    <h:form>
        <ui:include src="/pages/admin/menu.xhtml" />
        <p:growl id="msgs" showDetail="true" />
        <p:separator />
        <p:toolbar style="margin-bottom: 20px; border: none; background: transparent;">
            <f:facet name="left">
                <p:commandButton value="Nuevo Registro" icon="pi pi-save"
                    action="#{mermasDevolucionesBean.irARegistrarMermaDevolucion}" />
            </f:facet>
            <f:facet name="right">
                <p:commandButton value="Regresar" icon="pi pi-chevron-left"
                    action="#{mermasDevolucionesBean.irADashboard}" immediate="true" style="margin-left:10px;" />

            </f:facet>
        </p:toolbar>
        <p:separator />
        <h:panelGroup id="tablaMermasDevoluciones" layout="block">
            <p:panel header="Mermas y Devoluciones Registradas" style="margin-top: 10px;">
                <p:dataTable id="tablaRegistros" value="#{mermasDevolucionesBean.listaMermasDevoluciones}" var="prod"
                    emptyMessage="No hay  registrados en esta sesión."  rows="10" paginator="true" scrollable="true" scrollHeight="500">

                    <f:facet name="header">Mermas y Devoluciones Guardadas</f:facet>
                    <p:column headerText="Nombre Producto" width="100">
                        <h:outputText value="#{prod.producto.nombre}" />
                    </p:column>
                    <p:column headerText="Cantidad" width="80">
                        <h:outputText value="#{prod.cantidad}" />
                    </p:column>
                    <p:column headerText="Motivo" width="80">
                        <h:outputText value="#{prod.motivo}" />
                    </p:column>
                    <p:column headerText="Fecha" width="60">
                        <h:outputText value="#{prod.fecha}" />
                    </p:column>
                    <p:column headerText="Costo Perdido" width="70">
                        <h:outputText value="#{prod.costoPerdido}">
                            <f:convertNumber type="currency" currencySymbol="$" locale="es_MX" />
                        </h:outputText>
                    </p:column>
                    <p:column headerText="Tipo" width="70">
                        <h:outputText value="#{prod.tipo}" />
                    </p:column>

                    <p:column headerText="Responsable" width="70">
                        <h:outputText value="#{prod.usuario.nombre}" />
                    </p:column>
                </p:dataTable>
            </p:panel>
        </h:panelGroup>
        <ui:include src="/pages/admin/footer.xhtml" />
    </h:form>
</h:body>

</html>
