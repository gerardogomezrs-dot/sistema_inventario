<!DOCTYPE html >
<html lang="es-MX" xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <title>Sistema de Inventario - Mermas y Devoluciones</title>
    <link rel="icon" type="image/x-icon" href="#{request.contextPath}/favicon.ico" />
    <h:outputStylesheet library="primefaces" name="primeicons/primeicons.css" />
    <style>
        /* Estilo para simular el p:tag en PrimeFaces 7 */
        .badge-info {
            background-color: #e3f2fd;
            color: #1565c0;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid #2196f3;
            display: inline-block;
        }

        .ui-panel {
            margin-top: 10px;
        }

        /* ===== ESTILOS PARA LA TABLA DE MERMAS Y DEVOLUCIONES ===== */
        .mermas-table {
            width: 100%;
            border-collapse: collapse;
        }
        .mermas-table th, .mermas-table td {
            border: 1px solid #ddd;
            padding: 8px;
            text-align: left;
        }
        .mermas-table th {
            background-color: #f2f2f2;
            font-weight: bold;
        }
        .mermas-table tr:hover {
            background-color: #f9f9f9;
        }
        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            color: white;
            font-size: 12px;
            font-weight: bold;
        }
        .status-approved {
            background-color: #4caf50;
        }
        .status-pending {
            background-color: #ff9800;
        }
        .status-rejected {
            background-color: #f44336;
        }
    </style>
</h:head>
<h:body>
    <h:form>
        <p:panel header="Mermas y Devoluciones" styleClass="ui-panel-shadow">
            <p:commandButton value="Registrar Nueva Merma/Devolución" action="#{mermasDevolucionesBean.irARegistrarMermaDevolucion}"
                icon="pi pi-plus" ajax="false" styleClass="ui-button-raised mb-3" />
            <p:dataTable value="#{mermasDevolucionesBean.mermasDevoluciones}" var="md" styleClass="mermas-table">
                <p:column headerText="ID">
                    <h:outputText value="#{md.id}" />
                </p:column>
                <p:column headerText="Tipo">
                    <h:outputText value="#{md.tipo}" />
                </p:column>
                <p:column headerText="Producto">
                    <h:outputText value="#{md.producto.nombre}" />
                </p:column>
                <p:column headerText="Cantidad">
                    <h:outputText value="#{md.cantidad}" />
                </p:column>
                <p:column headerText="Fecha">
                    <h:outputText value="#{md.fecha}">
                        <f:convertDateTime pattern="dd/MM/yyyy" />
                    </h:outputText>
                </p:column>
                <p:column headerText="Estado">
                    <h:outputText value="#{md.estado}" styleClass="#{'status-badge ' + (md.estado == 'Aprobado' ? 'status-approved' : (md.estado == 'Pendiente' ? 'status-pending' : 'status-rejected'))}" />
                </p:column>
                <p:column headerText="Acciones">
                    <p:commandButton value="Ver Detalles" action="#{navBean.irADetallesMermaDevolucion(md)}"
                        icon="pi pi-eye" ajax="false" styleClass="ui-button-text" />
                    <!-- Agregar más botones de acción según sea necesario -->
                </p:column>
            </p:dataTable>
        </p:panel>
    </h:form>   
</h:body>
</html>
