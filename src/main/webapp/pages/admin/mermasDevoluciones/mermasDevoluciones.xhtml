<!DOCTYPE html>
<html lang="es-MX" xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <title>Sistema de Inventario - Registros de Mermas y Devoluciones</title>
    <link rel="icon" type="image/x-icon" href="#{request.contextPath}/favicon.ico" />
    <h:outputStylesheet library="primefaces" name="primeicons/primeicons.css" />
    <link rel="stylesheet" href="#{request.contextPath}/css/form.css" />

    <style type="text/css">
        .ui-panelgrid .ui-grid-responsive .ui-grid-row {
            border: none !important;
        }

        .label {
            font-weight: bold;
            width: 150px;
        }

        .value {
            width: 300px;
        }

        .main-container {
            display: flex;
            align-items: flex-start;
            gap: 20px;
            padding: 20px;
        }

        .form-side {
            flex: 0 0 600px;
        }

        .table-side {
            flex: 1;
        }
    </style>

</h:head>
<h:body>

    <h:form id="formMermasDevoluciones" enctype="multipart/form-data">
        <ui:include src="/pages/admin/menu.xhtml" />
        <p:growl id="msgs" showDetail="true" />
        <div class="main-container">
            <div class="form-side">
                <p:panel header="Registro de Mermas y Devoluciones" style="width: 600px; margin: 0 auto;">
                    <h:panelGrid columns="2" columnClasses="label,value">


                        <h:outputLabel value="Producto:" />
                        <h:selectOneMenu value="#{mermasDevolucionesBean.mermasDevoluciones.idProducto}"
                            style="width: 100%;">
                            <f:selectItem itemLabel="Seleccione un producto" itemValue="" noSelectionOption="true" />
                            <f:selectItems value="#{mermasDevolucionesBean.listaProductos}" var="prod"
                                itemLabel="#{prod.nombre}" itemValue="#{prod.idProducto}" />
                        </h:selectOneMenu>

                        <h:outputLabel value="Cantidad:" />
                        <p:inputTextarea value="#{mermasDevolucionesBean.mermasDevoluciones.cantidad}" rows="3" />

                        <p:outputLabel value="Motivo:" />
                        <p:inputTextarea value="#{mermasDevolucionesBean.mermasDevoluciones.motivo}" rows="3" />

                        <h:outputLabel value="Fecha:" />
                        <p:inputText value="#{mermasDevolucionesBean.mermasDevoluciones.fecha}" />

                        <h:outputLabel value="Costo Perdido:" />
                        <p:inputText value="#{mermasDevolucionesBean.mermasDevoluciones.costoPerdido}" />



                    </h:panelGrid>

                    <p:separator />

                    <p:commandButton value="Guardar" icon="pi pi-save" action="#{productoBean.guardarTabla}"
                        process="@form" update="formMermasDevoluciones"
                        oncomplete="if (!args.validationFailed) PF('dlgConfirmacion').show();" />

                    <p:commandButton value="Regresar" icon="pi pi-chevron-left"
                        action="#{productoBean.irATablaProductos}" immediate="true" style="margin-left: 10px;" />

                    <div class="upload-section" style="margin-top: 20px;">
                        <h:outputLabel value="Cargar desde archivo (CSV, Excel):"
                            style="display:block; margin-bottom:5px; font-weight:bold;" />
                        <p:fileUpload value="#{productoBean.uploadedFile}" mode="simple" skinSimple="true"
                            label="Seleccionar Archivo" chooseIcon="pi pi-upload" />

                        <p:commandButton value="Procesar Archivo" action="#{productoBean.cargaArchivos}" ajax="false"
                            styleClass="ui-button-help" style="margin-top: 5px;" icon="pi pi-file-import" />
                    </div>
                </p:panel>
            </div>

            <div class="table-side">
                <p:dataTable id="tablaRegistros" value="#{productoBean.listaProductosGuardar}" var="prod"
                    emptyMessage="No hay productos registrados en esta sesión." scrollable="true" scrollHeight="500">

                    <f:facet name="header">Productos Guardados</f:facet>

                    <p:column headerText="Código" width="100">
                        <h:outputText value="#{prod.codigoBarras}" />
                    </p:column>

                    <p:column headerText="Nombre">
                        <h:outputText value="#{prod.nombre}" />
                    </p:column>

                    <p:column headerText="Categoría">
                        <h:outputText value="#{prod.idCategoria}" />
                    </p:column>

                    <p:column headerText="Precio" width="80">
                        <h:outputText value="#{prod.precioUnitario}">
                            <f:convertNumber type="currency" currencySymbol="$" />
                        </h:outputText>
                    </p:column>

                    <p:column headerText="Stock" width="60">
                        <h:outputText value="#{prod.stockActual}" />
                    </p:column>

                    <p:column headerText="Estado" width="70">
                        <h:outputText value="#{prod.activo ? 'Sí' : 'No'}" />
                    </p:column>
                </p:dataTable>

                <p:separator />

                <p:commandButton value="Guardar" icon="pi pi-save" action="#{productoBean.guardarProductoTabla}"
                    process="@form" update="tablaRegistros, msgs" widgetVar="btnGuardar"
                    onclick="PF('pbAjax').start(); PF('btnGuardar').disable();"
                    oncomplete="if (args.validationFailed) { PF('pbAjax').cancel(); PF('btnGuardar').enable(); } else { PF('dlgConfirmacionGuardar').show(); }" />
            </div>

        </div>

        <p:dialog header="Mensaje" widgetVar="dlgConfirmacion" modal="true" closable="false">
            <h:outputText value="Datos guardados correctamente." />
            <br /><br />
            <p:commandButton value="Aceptar" type="button" onclick="PF('dlgConfirmacion').hide();" />
        </p:dialog>

        <p:dialog header="Mensaje" widgetVar="dlgConfirmacionGuardar" modal="true" closable="false">
            <h:outputText value="Datos guardados correctamente." />
            <br /><br />
            <p:commandButton value="Aceptar" type="button" onclick="PF('dlgConfirmacionGuardar').hide();" />
        </p:dialog>
        <ui:include src="/pages/admin/footer.xhtml" />
    </h:form>

</h:body>

</html>
