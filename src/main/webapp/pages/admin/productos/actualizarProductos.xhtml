<ui:composition xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
    <p:dialog id="dialogoEditar" header="Editar Producto" widgetVar="wdgEditar" modal="true" appendTo="@(body)"
        resizable="false">
        <h:form id="formEditar">
            <h:panelGrid columns="2" cellpadding="5">

                <p:outputLabel for="nombre" value="Nombre:" />
                <p:inputText id="nombre" value="#{productoBean.producto.nombre}" required="true" />

                <h:outputLabel value="Descripción:" />
                <p:inputTextarea value="#{productoBean.producto.descripcion}" rows="3" />

                <p:outputLabel for="categoria" value="Categoría:" />
                <p:selectOneMenu id="categoria" value="#{productoBean.producto.idCategoria}" style="width: 200px;">

                    <f:selectItem itemLabel="Seleccione una categoría" itemValue="" noSelectionOption="true" />

                    <f:selectItems value="#{productoBean.listaCategorias}" var="cat" itemLabel="#{cat.nombre}"
                        itemValue="#{cat.idCategoria}" style="width: 200px;" />

                </p:selectOneMenu>

                <p:outputLabel for="proveedor" value="Proveedor:" />
                <p:selectOneMenu id="proveedor" value="#{productoBean.producto.idProveedor}" style="width: 200px;">
                    <f:selectItem itemLabel="Seleccione un proveedor" itemValue="#{null}" noSelectionOption="true" />

                    <f:selectItems value="#{productoBean.listaProveedores}" var="prov" itemLabel="#{prov.nombreEmpresa}"
                        itemValue="#{prov.idProveedor}" />
                </p:selectOneMenu>

                <h:outputLabel value="Unidad:" />
                <p:inputText value="#{productoBean.producto.unidad}" />

                <h:outputLabel value="Precio Unitario:" />
                <p:inputText value="#{productoBean.producto.precioUnitario}" placeholder="$ 0.00" />

                <h:outputLabel value="Stock Actual:" />
                <p:inputText value="#{productoBean.producto.stockActual}" />

                <h:outputLabel value="Stock Mínimo:" />
                <p:inputText value="#{productoBean.producto.stockMinimo}" />

                <h:outputLabel value="Ubicación:" />
                 <p:selectOneMenu id="ubicacion" value="#{productoBean.producto.idUbicacion}" style="width: 200px;">
                            <f:selectItem itemLabel="Seleccione una ubicación" itemValue="" noSelectionOption="true" />
                            <f:selectItems value="#{productoBean.listaUbicaciones}" var="ubi"
                                           itemLabel="#{ubi.pasillo} - #{ubi.estante}" itemValue="#{ubi.idUbicacion}" />
                        </p:selectOneMenu>
                <h:outputLabel value="Activo:" />
                <p:selectBooleanCheckbox value="#{productoBean.producto.activo}" />
                <p:commandButton value="Guardar" icon="pi pi-save" action="#{productoBean.guardarCambios}"
                    update=":form:tablaProductos :form:msgs"
                    oncomplete="if (!args.validationFailed) { PF('wdgEditar').hide(); }" />
            </h:panelGrid>
        </h:form>
    </p:dialog>
</ui:composition>
