<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html lang="es-MX" xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <title>Gestión de Ubicaciones | Inventario</title>
    <style>
        body {
            background-color: #f4f7fb;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }

        .report-container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .ui-panel.custom-menu-panel .ui-panel-titlebar {
            background: #2c3e50;
            color: white;
            padding: 15px;
            font-size: 1.2rem;
        }

        .action-buttons {
            display: flex;
            gap: 5px;
        }

        /* Clases para el estado */
        .status-active {
            color: green;
            font-weight: bold;
        }

        .status-inactive {
            color: red;
            font-weight: bold;
        }
    </style>
    <link rel="icon" type="image/x-icon" href="#{request.contextPath}/favicon.ico" />
    <h:outputStylesheet name="primeicons/primeicons.css" library="primefaces" />
    <link rel="stylesheet" href="#{request.contextPath}/css/form.css" />
</h:head>
<h:body>



    <h:form id="formTablaUbicaciones">
        <!-- El menú suele ir fuera del formulario principal si tiene sus propias navegaciones -->
        <ui:include src="/pages/almacen/menu.xhtml" />
        <p:growl id="msgs" showDetail="true" />

        <p:toolbar style="margin-top: 20px; margin-bottom: 20px; border: none; background: transparent;">
            <f:facet name="left">
                <p:commandButton value="Nueva Ubicación" icon="pi pi-plus" action="#{ubicacionBean.irANuevaUbicacion}"
                    styleClass="ui-button-success" />
            </f:facet>
            <f:facet name="right">
                <p:commandButton value="Regresar" icon="pi pi-chevron-left" action="#{ubicacionBean.irADashBoard}"
                    immediate="true" styleClass="ui-button-secondary" />
            </f:facet>
        </p:toolbar>

        <div class="report-container">
            <p:panel header="Tabla de Ubicaciones" style="width: 100%; margin: 0 auto;">

                <p:dataTable id="tablaUbicaciones" var="prod" value="#{ubicacionBean.list}" rows="10" paginator="true"
                    paginatorPosition="bottom" filteredValue="#{ubicacionBean.filteredList}"
                    emptyMessage="No se encontraron Ubicaciones" style="margin-top:10px;" scrollable="true"
                    scrollHeight="400">

                    <p:column headerText="ID" style="width:60px; text-align:center;">
                        <h:outputText value="#{prod.idUbicacion}" />
                    </p:column>

                    <p:column headerText="Pasillo" filterBy="#{prod.pasillo}" filterMatchMode="contains">
                        <h:outputText value="#{prod.pasillo}" />
                    </p:column>

                    <p:column headerText="Estante" filterBy="#{prod.estante}" filterMatchMode="contains">
                        <h:outputText value="#{prod.estante}" />
                    </p:column>

                    <p:column headerText="Nivel" style="width:80px; text-align:center;">
                        <h:outputText value="#{prod.nivel}" />
                    </p:column>

                    <p:column headerText="Código Control">
                        <h:outputText value="#{prod.codigoControl}" />
                    </p:column>

                    <p:column headerText="Estado" style="width:100px; text-align:center;">
                        <h:outputText value="#{prod.estado}" />
                           
                    </p:column>

                    <p:column headerText="Acciones" style="width:120px; text-align:center;">
                        <div class="action-buttons">
                            <!-- EDITAR -->
                            <p:commandButton icon="pi pi-pencil" process="@this" update="@([id$=formEditar])"
                                oncomplete="PF('wdgEditar').show()">
                                <f:setPropertyActionListener value="#{prod}" target="#{ubicacionBean.ubicacion}" />
                            </p:commandButton>

                            <!-- ELIMINAR -->
                            <p:commandButton icon="pi pi-trash" styleClass="ui-button-danger" process="@this"
                                update=":formTablaUbicaciones:tablaUbicaciones :formTablaUbicaciones:msgs"
                                action="#{ubicacionBean.eliminar}">
                                <f:setPropertyActionListener value="#{prod}" target="#{ubicacionBean.ubicacion}" />
                                <p:confirm header="Confirmación" message="¿Está seguro de eliminar este registro?"
                                    icon="pi pi-exclamation-triangle" />
                            </p:commandButton>
                        </div>
                    </p:column>
                </p:dataTable>
            </p:panel>
        </div>
        <!-- Se asume que este include contiene su propio h:form id="formEditar" -->
        

        <!-- DIÁLOGOS Y COMPONENTES EXTERNOS (Fuera del form principal) -->
        <p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true" width="350">
            <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ui-button-flat"
                icon="pi pi-times" />
            <p:commandButton value="Sí" type="button" styleClass="ui-confirmdialog-yes ui-button-danger"
                icon="pi pi-check" />
        </p:confirmDialog>

    </h:form>
    <ui:include src="/pages/admin/ubicacion/actualizarUbicaciones.xhtml" />

        <ui:include src="/pages/admin/footer.xhtml" />
</h:body>

</html>
