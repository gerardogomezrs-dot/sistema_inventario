<!DOCTYPE html>
<html lang="es-MX" xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <title>Gestión de Proveedores | Almacén</title>
    <style>
        body {
            background-color: #f4f7fb;
            font-family: var(--font-family);
            margin: 0;
            padding: 20px;
        }

        .report-container {
            max-width: 900px;
            margin: 0 auto;
        }

        .ui-panel.custom-menu-panel .ui-panel-titlebar {
            background: #2c3e50;
            color: white;
            padding: 15px;
            font-size: 1.2rem;
        }
    </style>
    <link rel="icon" type="image/x-icon" href="#{request.contextPath}/favicon.ico" />
    <link rel="stylesheet" href="https://unpkg.com/primeicons@2.0.0/primeicons.css" />
    <h:outputStylesheet name="primeicons/primeicons.css" library="primefaces" />
    <h:outputStylesheet library="primefaces" name="primeicons/primeicons.css" />
    <link rel="stylesheet" href="#{request.contextPath}/css/form.css" />
</h:head>
<h:body>
    <h:form id="formTablaProveedores">

        <ui:include src="/pages/almacen/menu.xhtml" />

        <p:growl id="msgs" showDetail="true" />
        <p:separator />
        <p:toolbar style="margin-bottom: 20px; border: none; background: transparent;">
           
            <f:facet name="left">
                <p:commandButton value="Regresar" icon="pi pi-chevron-left"
                    action="#{proveedoresAlmacenBean.irADashboard}" immediate="true" style="margin-left:10px;" />
            </f:facet>
        </p:toolbar>
        <p:separator />
        <div class="report-container">
            <p:panel header="Tabla de Proveedores" style="width: 100%; margin: 0 auto;">
                <p:dataTable id="tablaProveedores" var="prod" value="#{proveedoresAlmacenBean.list}" rows="10"
                    paginator="true" filteredValue="#{proveedoresAlmacenBean.filteredList}"
                    emptyMessage="No se encontraron Proveedores" style="margin-top:20px;">

                    <p:column headerText="ID">
                        <h:outputText value="#{prod.idProveedor}" />
                    </p:column>
                    <p:column headerText="Nombre">
                        <h:outputText value="#{prod.nombreEmpresa}" />
                    </p:column>
                    <p:column headerText="Contacto">
                        <h:outputText value="#{prod.contactoEmpresa}" />
                    </p:column>
                    <p:column headerText="Teléfono">
                        <h:outputText value="#{prod.telefono}" />
                    </p:column>
                    <p:column headerText="Email">
                        <h:outputText value="#{prod.email}" />
                    </p:column>
                    <p:column headerText="Dirección">
                        <h:outputText value="#{prod.direccion}" />
                    </p:column>
                </p:dataTable>
            </p:panel>
        </div>
        <ui:include src="/pages/almacen/footer.xhtml" />
    </h:form>
</h:body>
</html>
