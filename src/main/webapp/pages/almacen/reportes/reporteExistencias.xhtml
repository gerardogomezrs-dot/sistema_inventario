<!DOCTYPE html>
<html lang="es-MX" xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <title>Reporte de Existencias</title>
            <link rel="stylesheet" href="#{request.contextPath}/css/dark-mode.css" />
            <link rel="stylesheet" href="https://unpkg.com/primeicons/primeicons.css" />

    <style>
        .ui-panelgrid .ui-grid-responsive .ui-grid-row {
            border: none !important;
        }

        .label {
            font-weight: bold;
            width: 150px;
        }

        .value {
            width: 300px;
        }

        .flex-container {
            display: flex;
            justify-content: space-around;
            align-items: flex-start;
            gap: 20px;
            padding: 20px;
        }

        /* Estilo extra para asegurar que el botón resalte */
        .btn-excel {
            background-color: #217346 !important;
            /* Verde Excel */
            border-color: #217346 !important;
            color: white !important;
        }

        .btn-pdf {
            background-color: #D32F2F !important;
            /* Rojo PDF */
            border-color: #D32F2F !important;
            color: white !important;
        }
    </style>
    <h:outputStylesheet library="primefaces" name="primeicons/primeicons.css" />
</h:head>
<h:body>

    <h:form id="formReporte">

        <ui:include src="/pages/almacen/menu.xhtml" />

        <p:separator />
        <p:toolbar style="margin-bottom: 20px; border: none; background: transparent;">
            <f:facet name="left">
                <p:commandButton value="Regresar" icon="pi pi-chevron-left"
                    action="#{inventarioReporteAlmacenBean.irADashBoard}" immediate="true" style="margin-left:10px;" />
            </f:facet>
        </p:toolbar>
        <p:separator />

        <p:panel header="Reporte de Existencias" style="margin: 20px;">

            <p:dataTable id="tblMovimientos" value="#{inventarioReporteAlmacenBean.reportesExistencias}" var="mov"
                paginator="true" rows="20" emptyMessage="No se encontraron movimientos">
                <f:facet name="header">
                    <div style="display: flex; justify-content: center; align-items: center; gap: 15px;">
                        <span style="font-weight: bold;"></span>

                        <p:commandButton value="Exportar Excel" icon="pi pi-file-excel" ajax="false"
                            styleClass="btn-excel">
                            <p:dataExporter type="xlsx" target="tblMovimientos"
                                postProcessor="#{inventarioReporteAlmacenBean.exportarReporteExistenciasExcel}"
                                fileName="#{inventarioReporteAlmacenBean.reporteExistencias}" pageOnly="false" />
                        </p:commandButton>

                        <p:commandButton value="Exportar Pdf" icon="pi pi-file-pdf" ajax="false" styleClass="btn-pdf">
                            <p:dataExporter type="pdf" target="tblMovimientos"
                                preProcessor="#{inventarioReporteAlmacenBean.exportarReporteExistenciasPdf}"
                                fileName="#{inventarioReporteAlmacenBean.reporteExistencias}" />
                        </p:commandButton>
                    </div>
                </f:facet>

                <p:column headerText="Codigo del producto">
                    <h:outputText value="#{mov.codigo}" />
                </p:column>
                <p:column headerText="Nombre Producto">
                    <h:outputText value="#{mov.nombreProducto}" />
                </p:column>
                <p:column headerText="Nombre Categoria">
                    <h:outputText value="#{mov.nombreCategoria}" />
                </p:column>
                <p:column headerText="Stock Disponible">
                    <h:outputText value="#{mov.stockDisponible}" />
                </p:column>
                <p:column headerText="Pasillo/Estante">
                    <h:outputText value="#{mov.ubicacion}" />
                </p:column>

                <p:column headerText="Precio Unitario">
                    <h:outputText value="#{mov.precioUnitario}">
                        <f:convertNumber type="currency" currencySymbol="$" locale="es_MX" />
                    </h:outputText>
                </p:column>
            </p:dataTable>
        </p:panel>
        <ui:include src="/pages/almacen/footer.xhtml" />
    </h:form>
</h:body>

</html>
