<!DOCTYPE html>
<html lang="es-MX" xmlns="http://www.w3.org/1999/xhtml" 
    xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core" 
    xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets">
<h:head>
    <title>Perfil de Usuario | Almacén</title>
    <style>
        :root {
            --primary-color: #0a58ca;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --bg-body: #f1f5f9;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .profile-container {
            max-width: 550px;
            margin: 60px auto;
            padding: 40px;
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        .profile-header {
            text-align: center;
            margin-bottom: 35px;
        }

        /* Avatar circular decorativo */
        .profile-avatar {
            width: 80px;
            height: 80px;
            background: #e2e8f0;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: var(--primary-color);
            font-size: 2rem;
        }

        .profile-header h2 {
            margin: 0;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .profile-details {
            display: flex;
            flex-direction: column;
            gap: 20px;
            border-top: 1px solid #f1f5f9;
            padding-top: 25px;
        }

        .detail-row {
            display: grid;
            grid-template-columns: 120px 1fr;
            align-items: center;
        }

        .label {
            font-weight: 600;
            color: var(--text-muted);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.025em;
        }

        .value {
            color: var(--text-main);
            font-weight: 500;
            font-size: 1.05rem;
            padding-left: 10px;
        }

        /* Estilo mejorado para el botón de PrimeFaces */
        .ui-button.back-button {
            width: 100% !important;
            margin-top: 35px !important;
            padding: 10px !important;
            background: var(--primary-color) !important;
            border: none !important;
            transition: transform 0.2s, background 0.2s !important;
            font-weight: 600 !important;
        }

        .ui-button.back-button:hover {
            background: #0849a5 !important;
            transform: translateY(-1px);
        }

        .footer-wrapper {
            margin-top: auto;
            padding-bottom: 20px;
        }

        @media (max-width: 480px) {
            .profile-container { margin: 20px; padding: 25px; }
            .detail-row { grid-template-columns: 1fr; gap: 5px; }
        }
    </style>
</h:head>
<h:body>

    <h:form id="formPerfil">
        <ui:include src="/pages/almacen/menu.xhtml" />

        <div class="profile-container">
            <div class="profile-header">
                <div class="profile-avatar">
                    <i class="pi pi-user"></i>
                </div>
                <h2>Perfil de Usuario</h2>
            </div>

            <div class="profile-details">
                <div class="detail-row">
                    <div class="label"><i class="pi pi-id-card" style="margin-right: 8px;"></i>Nombre:</div>
                    <div class="value">
                        <h:outputText value="#{loginBean.usuario.nombre}" />
                    </div>
                </div>

                <div class="detail-row">
                    <div class="label"><i class="pi pi-user-edit" style="margin-right: 8px;"></i>Usuario:</div>
                    <div class="value">
                        <h:outputText value="#{loginBean.usuario.userName}" />
                    </div>
                </div>

                <div class="detail-row">
                    <div class="label"><i class="pi pi-tag" style="margin-right: 8px;"></i>Rol:</div>
                    <div class="value">
                        <h:outputText value="#{loginBean.usuario.rol}" />
                    </div>
                </div>
            </div>
            <p:commandButton value="Regresar al Dashboard" 
                             icon="pi pi-arrow-left"
                             action="#{navegacionAlmacenBean.irADashboard()}" 
                             styleClass="back-button" 
                             ajax="false" />
        </div>
    </h:form>
    <div class="footer-wrapper">
        <ui:include src="/pages/almacen/footer.xhtml" />
    </div>
</h:body>
</html>
