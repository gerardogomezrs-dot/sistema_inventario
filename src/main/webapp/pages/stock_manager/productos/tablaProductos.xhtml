<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html lang="es-MX" xmlns="http://www.w3.org/1999/xhtml" xmlns:h="http://xmlns.jcp.org/jsf/html"
    xmlns:f="http://xmlns.jcp.org/jsf/core" xmlns:p="http://primefaces.org/ui"
    xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<h:head>
    <link rel="icon" type="image/x-icon" href="#{request.contextPath}/favicon.ico" />
    <link rel="stylesheet" href="https://unpkg.com/primeicons@2.0.0/primeicons.css" />
    <link rel="stylesheet" href="#{request.contextPath}/css/form.css" />
    <link rel="stylesheet" href="#{request.contextPath}/css/dark-mode.css" />
    <title>Gestión de Productos</title>
    <f:metadata>
        <f:viewParam name="query" value="#{productosManagerBean.filtro}" />
        <f:viewAction action="#{productosManagerBean.aplicarFiltroExterno}" />
    </f:metadata>
</h:head>
<h:body>
    <!-- FORM PRINCIPAL -->
    <h:form id="form">
        <ui:include src="/pages/stock_manager/menu.xhtml" />
        <p:growl id="msgs" showDetail="true" />
        <p:separator />
        <p:toolbar style="margin-bottom: 20px; border: none; background: transparent;">
            <f:facet name="left">

                <p:commandButton value="Nuevo Producto" icon="pi pi-save"
                    action="#{productosManagerBean.irANuevoProducto}" />
            </f:facet>
            <f:facet name="right">
                <p:commandButton value="Regresar" icon="pi pi-chevron-left"
                    action="#{productosManagerBean.irADashboard}" immediate="true" style="margin-left:10px;" />
            </f:facet>
        </p:toolbar>
        <p:separator />
        <p:dataTable id="tablaProductos" var="prod" value="#{productosManagerBean.listaProductosList}" rows="10"
            paginator="true" emptyMessage="No se encontraron productos">
            <p:column headerText="ID">
                <h:outputText value="#{prod.idProducto}" />
            </p:column>
            <p:column headerText="Nombre">
                <h:outputText value="#{prod.nombre}" />
            </p:column>
            <p:column headerText="Codigo de Barras">
                <p:barcode value="#{prod.codigoBarras}" type="code128" format="svg" width="150" height="60" />
            </p:column>
            <p:column headerText="Descripción">
                <h:outputText value="#{prod.descripcion}" />
            </p:column>
            <p:column headerText="Categoría">
                <h:outputText value="#{prod.categorias.nombre}" />
            </p:column>

            <p:column headerText="Proveedor">
                <h:outputText value="#{prod.proveedor.nombreEmpresa}" />
            </p:column>
            <p:column headerText="Unidad">
                <h:outputText value="#{prod.unidad}" />
            </p:column>
            <p:column headerText="Precio Unitario">
                <h:outputText value="#{prod.precioUnitario}" />
            </p:column>
            <p:column headerText="Stock Actual">
                <h:outputText value="#{prod.stockActual}" />
            </p:column>
            <p:column headerText="Stock Minimo">
                <h:outputText value="#{prod.stockMinimo}" />
            </p:column>
            <p:column headerText="Ubicación">
                <h:outputText value="#{prod.ubicacion}" />
            </p:column>
            <p:column headerText="Acciones">
                <!-- EDITAR -->
                <p:commandButton icon="pi pi-pencil" process="@this" update=":formEditar"
                    oncomplete="PF('wdgEditar').show()">
                    <f:setPropertyActionListener value="#{prod}" target="#{productosManagerBean.producto}" />
                </p:commandButton>

                <!-- ELIMINAR CON CONFIRMACIÓN -->
                <p:commandButton icon="pi pi-trash" styleClass="p-button-danger" process="@this"
                    update=":form:tablaProductos :form:msgs" action="#{productosManagerBean.eliminar}">

                    <f:setPropertyActionListener value="#{prod}" target="#{productosManagerBean.producto}" />

                    <p:confirm header="Confirmación" message="¿Está seguro de eliminar este producto?"
                        icon="pi pi-exclamation-triangle" />
                </p:commandButton>
            </p:column>
        </p:dataTable>
        <p:confirmDialog global="true" showEffect="fade" hideEffect="fade" responsive="true" width="350">
            <p:commandButton value="No" type="button" styleClass="ui-confirmdialog-no ui-button-flat"
                icon="pi pi-times" />
            <p:commandButton value="Sí" type="button" styleClass="ui-confirmdialog-yes p-button-danger"
                icon="pi pi-check" />
        </p:confirmDialog>
    </h:form>
    <!-- DIALOGO EDITAR -->
    <ui:include src="/pages/stock_manager/productos/actualizarProductos.xhtml" />
    <ui:include src="/pages/stock_manager/footer.xhtml" />
</h:body>

</html>
